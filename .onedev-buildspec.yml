version: 47
jobs:
- name: CI
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
  # Cargo registry + git index cache. Key has no checksum-files so it's
  # always a partial-match restore — registry index churns frequently
  # but is cheap to refresh incrementally.
  - type: SetupCacheStep
    name: cache cargo home
    key: cargo-home
    paths:
    - .cargo-home/registry
    - .cargo-home/git
    # Cache installed cargo binaries (cargo-audit, cargo-machete,
    # rust-code-analysis-cli) so the first run pays the install cost
    # once and every subsequent run reuses them.
    - .cargo-home/bin
    uploadStrategy: UPLOAD_IF_NOT_EXACT_MATCH
    condition: SUCCESSFUL
  # Compiled artefacts. Keyed off Cargo.lock — a lockfile change
  # invalidates and re-uploads. Lockfile-stable iterations reuse.
  - type: SetupCacheStep
    name: cache cargo target
    key: cargo-target
    checksumFiles: Cargo.lock
    paths:
    - target
    uploadStrategy: UPLOAD_IF_NOT_EXACT_MATCH
    condition: SUCCESSFUL
  - type: CommandStep
    name: fmt + clippy + test
    runInContainer: true
    # rust:1.84-bookworm ships rustc + cargo + git. rustfmt/clippy
    # components are added explicitly inside the step because the
    # base image strips them to keep size down.
    image: rust:1.84-bookworm
    runAs: '0:0'
    interpreter:
      # DefaultInterpreter executes the script with /bin/sh (dash on
      # Debian), which does NOT support `set -o pipefail`. Force bash
      # via the shebang so we get bash semantics throughout.
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euxo pipefail
        rustc --version
        cargo --version

        # Direct cargo at the cached locations so the SetupCacheStep
        # mounts are actually used.
        export CARGO_HOME="$(pwd)/.cargo-home"
        export CARGO_TARGET_DIR="$(pwd)/target"
        export PATH="$CARGO_HOME/bin:$PATH"
        mkdir -p "$CARGO_HOME"

        echo "=== rustup add rustfmt + clippy ==="
        rustup component add rustfmt clippy

        echo "=== fmt check ==="
        cargo fmt --all -- --check

        echo "=== clippy (deny warnings) ==="
        cargo clippy --all-targets --all-features -- -D warnings

        echo "=== test ==="
        cargo test --all --no-fail-fast

        echo "=== release smoke ==="
        cargo build --release --bin holocron
        ./target/release/holocron --version
    useTTY: false
    condition: SUCCESSFUL
  # Pre-install the external auditor binaries that Holocron orchestrates.
  # Doing this as a discrete step (rather than relying on --install-missing
  # inside the gate step) means transient network blips fail this step
  # cleanly and the rerun has a clear, scoped retry target. Cached into
  # .cargo-home/bin so steady-state runs skip all of this.
  - type: CommandStep
    name: install auditor binaries
    runInContainer: true
    image: rust:1.84-bookworm
    runAs: '0:0'
    interpreter:
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euxo pipefail
        export CARGO_HOME="$(pwd)/.cargo-home"
        export PATH="$CARGO_HOME/bin:$PATH"
        mkdir -p "$CARGO_HOME/bin"

        # Resilient cargo-install: retry on the transient "http2: client
        # connection lost" error we see when crates.io has a network blip.
        #
        # NOTE: install_one takes a single string of args (instead of using
        # bash positional forwarding) because OneDev's buildspec parser
        # treats the at-sign as variable interpolation delimiter and rejects
        # an unpaired bare one ("Last appearance of ... is a surprise to me").
        # Escaping by doubling works but is ugly to maintain, so we sidestep
        # the issue by avoiding bash positional-array expansion entirely.
        install_one() {
          local name="$1"
          local args="$2"
          if command -v "$name" >/dev/null 2>&1; then
            echo "=== $name already installed: $(command -v "$name") ==="
            return 0
          fi
          for attempt in 1 2 3; do
            echo "=== installing $name (attempt $attempt) ==="
            # Intentionally unquoted to allow word-splitting of $args.
            if cargo install $args --locked; then
              return 0
            fi
            echo "=== attempt $attempt failed, sleeping 10s ==="
            sleep 10
          done
          echo "=== $name install failed after 3 attempts ==="
          return 1
        }

        install_one cargo-audit "cargo-audit"
        install_one cargo-machete "cargo-machete"
        install_one cargo-deny "cargo-deny"
        install_one cargo-outdated "cargo-outdated"
        install_one rust-code-analysis-cli "--git https://github.com/mozilla/rust-code-analysis rust-code-analysis-cli"

        echo "=== installed binaries ==="
        ls -la "$CARGO_HOME/bin"
    useTTY: false
    condition: SUCCESSFUL
  # Dogfood gate (#20). After Holocron compiles, audit its own source
  # tree and require an A- or better overall grade.
  #
  # If this step fails, the change introduced a quality regression
  # holocron itself can detect. Fix the findings or, if the regression
  # is intentional, lower the threshold here with the reasoning in the
  # commit message.
  - type: CommandStep
    name: dogfood (holocron audits itself)
    runInContainer: true
    image: rust:1.84-bookworm
    runAs: '0:0'
    interpreter:
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euxo pipefail
        export CARGO_HOME="$(pwd)/.cargo-home"
        export CARGO_TARGET_DIR="$(pwd)/target"
        export PATH="$CARGO_HOME/bin:$PATH"

        echo "=== holocron audits holocron ==="
        ./target/release/holocron audit . --fail-below A-
    useTTY: false
    condition: SUCCESSFUL
  triggers:
  - type: BranchUpdateTrigger
    userMatch: anyone
  retryCondition: never
  maxRetries: 0
  retryDelay: 30
  # Bumped from 1800 → 3600 to give --install-missing room on a cold
  # cache (cargo-audit + machete + rust-code-analysis-cli total ~5 min).
  timeout: 3600
