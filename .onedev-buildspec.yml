version: 49
jobs:
- name: CI
  steps:
  - type: CheckoutStep
    name: checkout
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: lint buildspec for at-sign hazards
    runInContainer: true
    image: debian:bookworm-slim
    interpreter:
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euo pipefail
        ./scripts/check-buildspec-atsigns.sh .onedev-buildspec.yml
    runAs: 0:0
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  - type: SetupCacheStep
    name: cache cargo home
    key: cargo-home-v2
    paths:
    - .cargo-home/registry
    - .cargo-home/git
    - .cargo-home/bin
    uploadStrategy: UPLOAD_IF_NOT_EXACT_MATCH
    condition: SUCCESSFUL
    optional: false
  - type: SetupCacheStep
    name: cache cargo target
    key: cargo-target
    checksumFiles: Cargo.lock
    paths:
    - target
    uploadStrategy: UPLOAD_IF_NOT_EXACT_MATCH
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: fmt + clippy + test
    runInContainer: true
    image: rust:1.84-bookworm
    interpreter:
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euxo pipefail
        rustc --version
        cargo --version

        # Direct cargo at the cached locations so the SetupCacheStep
        # mounts are actually used.
        export CARGO_HOME="$(pwd)/.cargo-home"
        export CARGO_TARGET_DIR="$(pwd)/target"
        export PATH="$CARGO_HOME/bin:$PATH"
        mkdir -p "$CARGO_HOME"

        echo "=== rustup add rustfmt + clippy ==="
        rustup component add rustfmt clippy

        echo "=== fmt check ==="
        cargo fmt --all -- --check

        echo "=== clippy (deny warnings) ==="
        cargo clippy --all-targets --all-features -- -D warnings

        echo "=== test ==="
        cargo test --all --no-fail-fast

        echo "=== release smoke ==="
        cargo build --release --bin holocron
        ./target/release/holocron --version
    runAs: 0:0
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: install auditor binaries
    runInContainer: true
    image: rust:1.84-bookworm
    interpreter:
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euxo pipefail
        export CARGO_HOME="$(pwd)/.cargo-home"
        export PATH="$CARGO_HOME/bin:$PATH"
        mkdir -p "$CARGO_HOME/bin"

        # Bootstrap cargo-binstall once. It ships a one-line installer that
        # downloads its own precompiled binary so we don't pay a from-source
        # compile for the tool that exists to skip from-source compiles.
        if ! command -v cargo-binstall >/dev/null 2>&1; then
          echo "=== bootstrapping cargo-binstall ==="
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        fi

        # Resilient install: try binstall first (precompiled GitHub release),
        # fall back to cargo install --locked on failure. Both modes are
        # network-bound and benefit from the 3-attempt retry.
        #
        # NOTE: install_one takes a single string of args (instead of using
        # bash positional forwarding) because OneDev's buildspec parser
        # treats the at-sign as variable interpolation delimiter and rejects
        # an unpaired bare one ("Last appearance of ... is a surprise to me").
        # Escaping by doubling works but is ugly to maintain, so we sidestep
        # the issue by avoiding bash positional-array expansion entirely.
        install_one() {
          local name="$1"
          local args="$2"
          local prefer_binstall="${3:-true}"
          if command -v "$name" >/dev/null 2>&1; then
            echo "=== $name already installed: $(command -v "$name") ==="
            return 0
          fi
          for attempt in 1 2 3; do
            echo "=== installing $name (attempt $attempt) ==="
            if [ "$prefer_binstall" = "true" ]; then
              # binstall: precompiled binary from GitHub releases
              if cargo binstall --no-confirm $args; then return 0; fi
              echo "=== binstall failed, falling back to from-source ==="
            fi
            # Intentionally unquoted to allow word-splitting of $args.
            if cargo install $args --locked; then
              return 0
            fi
            echo "=== attempt $attempt failed, sleeping 10s ==="
            sleep 10
          done
          echo "=== $name install failed after 3 attempts ==="
          return 1
        }

        install_one cargo-audit "cargo-audit"
        install_one cargo-machete "cargo-machete"
        install_one cargo-deny "cargo-deny"
        install_one cargo-outdated "cargo-outdated"
        install_one cargo-geiger "cargo-geiger"
        # rust-code-analysis-cli has no GitHub binary releases — skip
        # binstall and go straight to from-source.
        install_one rust-code-analysis-cli "--git https://github.com/mozilla/rust-code-analysis rust-code-analysis-cli" false

        echo "=== installed binaries ==="
        ls -la "$CARGO_HOME/bin"
    runAs: 0:0
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: dogfood (holocron audits itself)
    runInContainer: true
    image: rust:1.84-bookworm
    interpreter:
      type: ShellInterpreter
      shell: /bin/bash
      commands: |
        set -euxo pipefail
        export CARGO_HOME="$(pwd)/.cargo-home"
        export CARGO_TARGET_DIR="$(pwd)/target"
        export PATH="$CARGO_HOME/bin:$PATH"

        # Pre-warm rustup: the per-step CARGO_HOME has the auditor bins
        # but no toolchain symlinks. When holocron's clippy/cargo-audit
        # auditors fire in parallel they each trigger a rustup sync and
        # race on the .partial rename in /usr/local/rustup/downloads.
        # Force ONE sequential sync up-front so the toolchain is warm
        # before the parallel auditors hit it.
        echo "=== pre-warm rustup toolchain ==="
        cargo --version
        rustup component add clippy 2>/dev/null || true

        echo "=== holocron audits holocron ==="
        ./target/release/holocron audit . --progress log --fail-below A-
    runAs: 0:0
    useTTY: false
    condition: SUCCESSFUL
    optional: false
  triggers:
  - type: BranchUpdateTrigger
    userMatch: anyone
  retryCondition: never
  maxRetries: 0
  retryDelay: 30
  timeout: 3600
- name: Push to Github
  steps:
  - type: PushRepository
    name: Github
    remoteUrl: https://github.com/abudhu/holocron
    passwordSecret: access-token
    force: true
    condition: SUCCESSFUL
    optional: false
  triggers:
  - type: BranchUpdateTrigger
    userMatch: anyone
  - type: TagCreateTrigger
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
