# .holocronrc.toml — Holocron audit configuration
#
# Generated by `holocron init`. Commit this file to your repo if you
# want consistent audit settings across local runs and CI.
#
# This config is currently ADVISORY — Holocron 0.2.x doesn't read any
# of these keys yet. The schema is committed so you can pre-stage
# settings for upcoming Holocron releases that will wire them in.
# Until then this file is documentation-only; nothing reads it at
# runtime.
#
# Everything is commented out by default — uncomment + edit what you
# want to change. Anything you leave commented uses the built-in
# defaults.

# -----------------------------------------------------------------------
# [gate] — CI gate threshold (read by --fail-below if the flag is omitted)
# -----------------------------------------------------------------------
[gate]
# Minimum overall grade required. Accepts A+, A, A-, B+, B, B-, C+, C,
# C-, D+, D, D-, F. Unicode minus (A−) and ASCII dash (A-) both work.
# Uncomment to enable; without it Holocron exits 0 on any grade.
#
# fail_below = "A-"

# -----------------------------------------------------------------------
# [auditors] — enable/disable individual auditors
# -----------------------------------------------------------------------
# All seven default auditors are enabled by default. Disable one to
# skip it entirely (vs --install-missing, which only suppresses the
# install attempt). The category stays in the grade as Skipped, with
# `reason = "disabled in .holocronrc.toml"`.
[auditors]
# clippy = true
# cargo-audit = true
# cargo-machete = true
# cargo-deny = true
# cargo-outdated = true
# cargo-geiger = true
# rust-code-analysis = true

# -----------------------------------------------------------------------
# [complexity] — rust-code-analysis thresholds
# -----------------------------------------------------------------------
# Functions with cyclomatic or cognitive complexity at or above the
# threshold are surfaced at the named severity. Defaults match the
# built-in opinionated ladder.
[complexity]
# cyclomatic_medium = 15
# cyclomatic_high   = 25
# cognitive_medium  = 20
# cognitive_high    = 35

# -----------------------------------------------------------------------
# [[allowlist]] — suppress specific findings
# -----------------------------------------------------------------------
# Match by stable fingerprint (preferred; see the JSON sidecar) or by
# auditor + code + message-prefix. Allowlisted findings still appear in
# the report but are tagged `allowlisted = true` and don't contribute
# to the grade.
#
# Use this for false positives you can't fix at the source (e.g. a
# clippy lint that's wrong for your codebase shape, or a CVE in a
# transitive dep you can't upgrade until upstream).
#
# Each entry needs `reason` for posterity — drive-by allowlists rot
# fast without a written justification.
#
# [[allowlist]]
# fingerprint = "a1b2c3d4e5f60718"
# reason = "false positive: doc_markdown on intentional code block"
#
# [[allowlist]]
# auditor = "cargo-audit"
# code = "RUSTSEC-2024-0001"
# reason = "transitive via tokio; upstream PR open; tracked in issue #99"

# -----------------------------------------------------------------------
# [weights] — override category weights in the overall grade
# -----------------------------------------------------------------------
# Defaults: Security 0.30, Lints 0.20, Complexity 0.20, DeadCode 0.15,
# Maintenance 0.15. Must sum to 1.0. Useful for codebases where one
# category dominates risk (e.g. a crypto library wanting Security 0.50).
[weights]
# security    = 0.30
# lints       = 0.20
# complexity  = 0.20
# dead_code   = 0.15
# maintenance = 0.15
