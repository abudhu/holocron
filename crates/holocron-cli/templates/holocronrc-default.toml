# .holocronrc.toml — Holocron audit configuration
#
# Generated by `holocron init`. Commit this file to your repo for
# consistent audit settings across local runs and CI.
#
# Every section below is fully wired and active. Walk-up resolution:
# Holocron looks for `.holocronrc.toml` in the target dir, then each
# ancestor up to the filesystem root.
#
# Everything is commented out by default — uncomment + edit what you
# want to change. Anything you leave commented uses the built-in
# defaults. Unknown keys are rejected at load with a line-numbered
# error and a list of valid options.

# -----------------------------------------------------------------------
# [gate] — CI gate threshold (active — read by --fail-below when omitted)
# -----------------------------------------------------------------------
[gate]
# Minimum overall grade required. Accepts A+, A, A-, B+, B, B-, C+, C,
# C-, D+, D, D-, F. Unicode minus (A−) and ASCII dash (A-) both work.
# When set, `holocron audit` uses this as the default for --fail-below.
# An explicit --fail-below flag always wins over this value.
# Uncomment to enable.
#
# fail_below = "A-"

# -----------------------------------------------------------------------
# [auditors] — enable/disable individual auditors (active)
# -----------------------------------------------------------------------
# All seven default auditors are enabled by default. Disable one to
# skip it entirely. Disabling all auditors in a category marks that
# category as Skipped (advisory grade, exit code 3). Disabling one
# auditor in a multi-auditor category (e.g. cargo-deny in Maintenance)
# leaves the category graded by the remaining auditor.
#
# cargo-mutants is opt-in via --with-mutants; set false here as a kill
# switch even when the flag is passed.
[auditors]
# clippy             = true
# cargo-audit        = true
# cargo-machete      = true
# cargo-deny         = true
# cargo-outdated     = true
# cargo-geiger       = true
# rust-code-analysis = true
# cargo-mutants      = false

# -----------------------------------------------------------------------
# [complexity] — rust-code-analysis thresholds (active)
# -----------------------------------------------------------------------
# Functions with cyclomatic or cognitive complexity at or above the
# threshold are surfaced at the named severity. Defaults match the
# built-in opinionated ladder.
[complexity]
# cyclomatic_medium = 15
# cyclomatic_high   = 25
# cognitive_medium  = 20
# cognitive_high    = 35

# -----------------------------------------------------------------------
# [[allowlist]] — suppress specific findings from the grade (active)
# -----------------------------------------------------------------------
# Allowlisted findings still appear in the report's "Allowlisted
# Findings" section with the rationale, but are excluded from category
# scores and the overall grade.
#
# Match fields are AND-ed: an entry with only `auditor = "clippy"`
# matches every clippy finding; adding `code` narrows it to specific
# clippy lints; adding `path` narrows further to specific files.
# Empty entries are rejected at load.
#
# Fields:
#   fingerprint   — exact match against the 16-char hex finding id
#                   (see JSON sidecar `findings[*].fingerprint`).
#                   Most precise way to suppress a single finding.
#   auditor       — exact match: "clippy", "cargo-audit", etc.
#   code          — exact match: "clippy::unwrap_used", "RUSTSEC-2024-0001".
#   message_prefix — finding.message must start with this string.
#   path          — substring match against finding.location.file.
#   reason        — human-readable rationale, echoed in the report.
#                   Strongly recommended; drive-by allowlists rot fast
#                   without a written justification.
#
# >>> For findings with a source location, prefer the inline form:
# >>>     // holocron: ignore <code> -- <reason>
# >>> directly above the offending line. See the "Inline annotations"
# >>> section of the README. The rc allowlist is better for project-wide
# >>> findings (CVE advisories, license rejections) or for catch-all
# >>> rules that match many files.
#
# [[allowlist]]
# fingerprint = "a1b2c3d4e5f60718"
# reason = "false positive: doc_markdown on intentional code block"
#
# [[allowlist]]
# auditor = "cargo-audit"
# code = "RUSTSEC-2024-0001"
# reason = "transitive via tokio; upstream PR open; tracked in issue #99"
#
# [[allowlist]]
# auditor = "clippy"
# path = "tests/"
# reason = "test code gets unwrap_used etc. — known."

# -----------------------------------------------------------------------
# [weights] — override category weights in the overall grade (active)
# -----------------------------------------------------------------------
# Defaults: Security 0.30, Lints 0.20, Complexity 0.20, DeadCode 0.15,
# Maintenance 0.15. Should sum to 1.0 — if your overrides don't, the
# grader renormalizes and emits a stderr warning. Useful for codebases
# where one category dominates risk (e.g. a crypto library wanting
# Security 0.50).
[weights]
# security    = 0.30
# lints       = 0.20
# complexity  = 0.20
# dead_code   = 0.15
# maintenance = 0.15
